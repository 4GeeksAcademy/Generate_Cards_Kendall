<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="./assets/img/4geeks.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cards Generator</title>
  <!-- Fontawesome is our recomended library for icons -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.2.0/css/all.css"
    integrity="sha384-hWVjflwFxL6sNzntih27bfxkr27PmbbK/iSvJ+a4+0owXq79v+lsFkW54bOGbiDQ" crossorigin="anonymous" />
</head>

<body class="min-vh-100 bg-success d-flex align-items-center">
  <!-- Write your HTML code here, you can delete everything withing the body tags -->
  <div class="container-fluid d-flex justify-content-center align-items-center flex-column">
    <div class="card text-center d-flex justify-content-between rounded-5" style="width: 380px; height: 500px;">
      <h1 class="suits text-start display-1 p-2">♦</h1>
      <h1 id = number class="display-1 fw-bold">1</h1>
      <h1 class="suits text-start display-1 p-2 rotate">♦</h1>
    </div>
    <button type="button" class="btn btn-secondary m-4">Change</button>
  </div>

  <!-- Do not delete this script tag, this is what connects your HTML with the Javascript code -->
  <script type="module" src="/app.js"></script>
</body>

</html>
